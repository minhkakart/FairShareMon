<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FairShareMon</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#863bff" />
    <meta name="description" content="Sổ ghi nợ chi tiêu" />
    <!-- iOS standalone home-screen app -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FairShareMon" />
    <script>
      // Pre-paint: apply the persisted theme + lang before React mounts so
      // there is no flash. Mirrors ThemeProvider/LocaleProvider storage keys.
      (function () {
        try {
          var theme = localStorage.getItem("fsm.theme");
          if (theme === "light" || theme === "dark") {
            document.documentElement.setAttribute("data-theme", theme);
          }
          var locale = localStorage.getItem("fsm.locale");
          document.documentElement.lang = locale === "en-US" ? "en" : "vi";
        } catch (e) {
          /* storage unavailable — fall back to defaults */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
