# Ban action: maintain an nginx `deny` list on a shared volume. No iptables and no
# Docker socket — the nginx container watches this file and reloads itself. Works
# behind the tunnel because the IP here is the real client IP (from X-Forwarded-For).
[Definition]
actionstart = touch /blocked/banned.conf
actionstop =
actioncheck =
actionban = grep -qF 'deny <ip>;' /blocked/banned.conf 2>/dev/null || echo 'deny <ip>;' >> /blocked/banned.conf
actionunban = grep -vF 'deny <ip>;' /blocked/banned.conf > /blocked/banned.conf.tmp 2>/dev/null; mv /blocked/banned.conf.tmp /blocked/banned.conf
