user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Real client IP -------------------------------------------------------
    # Traffic arrives via a host proxy / tunnel that terminates TLS, so the real
    # client IP is in X-Forwarded-For. nginx is only reachable over the internal
    # network, so we trust the private ranges. Tighten to the exact upstream
    # subnet/IP if you know it.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # --- Logging (a real file so fail2ban can tail it) ------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile          on;
    keepalive_timeout 65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/xml image/svg+xml;

    # Preserve the upstream scheme for the API's forwarded-headers (TLS is upstream).
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # --- Rate-limit zones (keyed on the real client IP) -----------------------
    limit_req_zone  $binary_remote_addr zone=api_general:10m rate=10r/s;   # general API/web
    limit_req_zone  $binary_remote_addr zone=auth:10m        rate=20r/m;   # login / refresh
    limit_req_zone  $binary_remote_addr zone=register:10m    rate=1r/m;    # account creation
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # --- fail2ban deny-list ---------------------------------------------------
    # fail2ban appends `deny <ip>;` lines here (real IPs); the glob never errors
    # when empty. `deny` uses the real_ip-rewritten $remote_addr, so bans hit the
    # real client at L7 (returns 403).
    include /etc/nginx/blocked/*.conf;

    include /etc/nginx/conf.d/*.conf;
}
