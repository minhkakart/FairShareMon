# API — proxies to the .NET container on :8080. Client calls this subdomain
# cross-origin; CORS is owned by the API (App:AllowedOrigins), not nginx.
server {
    listen 80;
    server_name fairsharemon-api.minhkakart.com;

    limit_conn perip 20;

    # Shared proxy headers (inherited by every location below, which set none of
    # their own — so inheritance applies).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;

    # Health check: never rate-limited, no log noise (used by uptime probes).
    location = /api/v1/health {
        access_log off;
        proxy_pass http://api:8080;
    }

    # Brute-force-sensitive auth endpoints: tighter than the general API.
    location = /api/v1/auth/login {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api:8080;
    }
    location = /api/v1/auth/refresh {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api:8080;
    }

    # Account creation: strict edge cap; fail2ban enforces the ~5/IP/hour limit.
    location = /api/v1/auth/register {
        limit_req zone=register burst=3 nodelay;
        proxy_pass http://api:8080;
    }

    # Everything else on the API.
    location / {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://api:8080;
    }
}
