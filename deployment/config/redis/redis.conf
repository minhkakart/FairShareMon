bind 0.0.0.0
protected-mode yes

port 6379

appendonly yes
appendfsync everysec

save 900 1
save 300 10
save 60 10000

dir /data

# Eviction requires a memory ceiling — without maxmemory the policy below never triggers.
# Tune to the host; the token whitelist has a DB fallback, so LRU eviction is safe.
maxmemory 256mb
maxmemory-policy allkeys-lru
